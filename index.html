<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉛直運動シミュレーター</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 20px;
            color: #333;
        }
        .controls, .graph-toggles {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
        .controls-row {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .controls label {
            font-weight: bold;
        }
        .controls input[type="number"] {
            width: 70px;
            padding: 5px;
            font-size: 16px;
        }
        .radio-group {
            background: #e9ecef;
            padding: 5px 15px;
            border-radius: 5px;
            border: 1px solid #ced4da;
        }
        button {
            padding: 8px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        button#resetBtn { background-color: #6c757d; }
        button#resetBtn:hover { background-color: #5a6268; }
        
        /* 縦型シミュレーション画面のデザイン */
        #simulation-wrapper {
            width: 100%;
            height: 500px; /* ビューポートの高さ */
            overflow-y: auto; /* 縦スクロール */
            overflow-x: hidden;
            border: 1px solid #ced4da;
            border-radius: 8px;
            margin-bottom: 20px;
            background-color: #e9ecef;
            position: relative;
        }
        #simulation-area {
            position: relative;
            width: 100%;
            /* heightはJSで動的に設定されます */
        }
        #y-axis {
            position: absolute;
            top: 0;
            left: 100px;
            width: 2px;
            height: 100%;
            background-color: #212529;
        }
        #y-axis::before {
            content: "y (m)";
            position: absolute;
            left: -40px;
            top: 10px;
            font-weight: bold;
        }

        /* 地面（y=0）のマーカー */
        .ground-line {
            position: absolute;
            left: 50px;
            width: 200px;
            height: 4px;
            background-color: #8B4513; /* 茶色 */
            z-index: 1;
        }
        .ground-label {
            position: absolute;
            left: 260px;
            font-weight: bold;
            color: #8B4513;
            transform: translateY(-50%);
        }

        /* 目盛りとプロットのデザイン */
        .tick {
            position: absolute;
            left: 95px;
            width: 10px;
            height: 2px;
            background-color: #212529;
        }
        .tick-label {
            position: absolute;
            left: 60px;
            transform: translateY(-50%);
            font-size: 14px;
            font-weight: bold;
        }
        .plot-mark {
            position: absolute;
            left: 95px;
            width: 10px;
            height: 4px;
            background-color: #27ae60;
            z-index: 5;
        }
        .plot-label {
            position: absolute;
            left: 140px;
            transform: translateY(-50%);
            font-size: 12px;
            font-weight: bold;
            color: #27ae60;
            background-color: rgba(255,255,255,0.8);
            padding: 2px 4px;
            border-radius: 3px;
            white-space: pre;
        }
        
        /* 小球と速さ表示 */
        #ball {
            position: absolute;
            left: 91px;
            width: 20px;
            height: 20px;
            background-color: #e74c3c;
            border-radius: 50%;
            z-index: 10;
        }
        #speed-label {
            position: absolute;
            left: 30px;
            top: -5px;
            width: 70px;
            text-align: left;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 4px;
            padding: 2px 4px;
            border: 1px solid #ccc;
        }

        /* グラフエリア */
        .graph-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .graph-box {
            flex: 1;
            min-width: 300px;
            background: #fff;
            padding: 15px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h2>鉛直運動シミュレーター（落下・投げ上げ）</h2>

    <div class="controls">
        <div class="controls-row radio-group">
            <label>
                <input type="radio" name="mode" value="down" checked> 下向きを正 (+y) [自由落下・投げ下ろし]
            </label>
            <label>
                <input type="radio" name="mode" value="up"> 上向きを正 (+y) [鉛直投げ上げ]
            </label>
        </div>
        <div class="controls-row">
            <label>初期位置 y0 (m): <input type="number" id="y0" value="0" step="5"></label>
            <label>初速度 v0 (m/s): <input type="number" id="v0" value="0" step="1"></label>
            <label>重力加速度 g (m/s²): <input type="number" id="g" value="9.8" step="0.1"></label>
        </div>
        <div class="controls-row">
            <button id="startBtn">スタート</button>
            <button id="resetBtn">リセット</button>
            <span id="time-display" style="font-weight: bold; font-size: 18px;">時間: 0.0 s</span>
        </div>
    </div>

    <div class="graph-toggles">
        <label><input type="checkbox" id="vtToggle" checked> v-tグラフを表示</label>
        <label><input type="checkbox" id="ytToggle" checked> y-tグラフを表示</label>
    </div>

    <div id="simulation-wrapper">
        <div id="simulation-area">
            <div id="y-axis"></div>
            <div id="markers-container"></div>
            <div id="ball">
                <div id="speed-label">0.0 m/s</div>
            </div>
        </div>
    </div>

    <div class="graph-container">
        <div class="graph-box" id="vtBox"><canvas id="vtGraph"></canvas></div>
        <div class="graph-box" id="ytBox"><canvas id="ytGraph"></canvas></div>
    </div>

    <script>
        const PIXELS_PER_METER = 6; // 1メートルあたりのピクセル数
        const MAX_TIME = 10;     
        
        let currentMinY = 0;
        let currentMaxY = 100;
        let mode = 'down';

        let animationId;
        let startTime = null;
        let isRunning = false;
        let y0 = 0, v0 = 0, g = 9.8, a = 9.8;
        let lastGraphUpdateTime = 0;
        let nextPlotTime = 1.0; 

        // DOM要素
        const ball = document.getElementById('ball');
        const speedLabel = document.getElementById('speed-label');
        const timeDisplay = document.getElementById('time-display');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const simulationArea = document.getElementById('simulation-area');
        const simulationWrapper = document.getElementById('simulation-wrapper');
        const markersContainer = document.getElementById('markers-container');
        const modeRadios = document.getElementsByName('mode');

        // グラフの初期化
        const ctxVt = document.getElementById('vtGraph').getContext('2d');
        const ctxYt = document.getElementById('ytGraph').getContext('2d');

        const chartConfig = {
            type: 'scatter',
            options: {
                responsive: true,
                animation: false,
                scales: {
                    x: { type: 'linear', position: 'bottom', title: { display: true, text: '時間 t (s)' }, min: 0, max: MAX_TIME }
                },
                elements: { point: { radius: 0 }, line: { tension: 0 } }
            }
        };

        const vtChart = new Chart(ctxVt, {
            ...chartConfig,
            data: { datasets: [{ label: '速度 v (m/s)', borderColor: '#e74c3c', showLine: true, data: [] }] },
            options: { ...chartConfig.options, scales: { ...chartConfig.options.scales, y: { title: { display: true, text: '速度 v (m/s)' } } } }
        });

        const ytChart = new Chart(ctxYt, {
            ...chartConfig,
            data: { datasets: [{ label: '変位 y (m)', borderColor: '#3498db', showLine: true, data: [] }] },
            options: { ...chartConfig.options, scales: { ...chartConfig.options.scales, y: { title: { display: true, text: '変位 y (m)' } } } }
        });

        // 物理座標(y)から画面のピクセル座標(Top)に変換する関数
        function getVisualY(y_val) {
            if (mode === 'down') {
                // 下向き正：上が最小値、下が最大値
                return (y_val - currentMinY) * PIXELS_PER_METER;
            } else {
                // 上向き正：下が最小値、上が最大値
                return (currentMaxY - y_val) * PIXELS_PER_METER;
            }
        }

        // 環境の動的セットアップ
        function setupEnvironment() {
            mode = document.querySelector('input[name="mode"]:checked').value;
            y0 = parseFloat(document.getElementById('y0').value);
            v0 = parseFloat(document.getElementById('v0').value);
            g = parseFloat(document.getElementById('g').value);
            
            // 加速度の符号を決定
            a = (mode === 'down') ? g : -g;

            // 10秒間の最大・最小変位を計算
            let minY = y0, maxY = y0;
            for(let t=0; t<=MAX_TIME; t+=0.1) {
                let y = y0 + v0 * t + 0.5 * a * Math.pow(t, 2);
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
            }

            // 地面(y=0)が必ず画面内に入るように調整
            if (minY > 0) minY = 0;
            if (maxY < 0) maxY = 0;

            // 余白を持たせる
            currentMinY = Math.floor(minY / 10) * 10 - 20;
            currentMaxY = Math.ceil(maxY / 10) * 10 + 20;

            // コンテナの高さを設定
            const totalHeight = (currentMaxY - currentMinY) * PIXELS_PER_METER;
            simulationArea.style.height = `${totalHeight}px`;

            // 目盛りと地面の描画
            markersContainer.innerHTML = '';
            
            // 地面（y=0）の特別なライン
            const groundY = getVisualY(0);
            const groundLine = document.createElement('div');
            groundLine.className = 'ground-line';
            groundLine.style.top = `${groundY}px`;
            const groundLabel = document.createElement('div');
            groundLabel.className = 'ground-label';
            groundLabel.innerText = "y = 0 (基準)";
            groundLabel.style.top = `${groundY}px`;
            markersContainer.appendChild(groundLine);
            markersContainer.appendChild(groundLabel);

            // 通常の目盛り（20m刻み）
            for (let i = currentMinY; i <= currentMaxY; i += 20) {
                const py = getVisualY(i);
                const tick = document.createElement('div');
                tick.className = 'tick';
                tick.style.top = `${py}px`;
                const label = document.createElement('div');
                label.className = 'tick-label';
                label.innerText = i;
                label.style.top = `${py}px`;
                markersContainer.appendChild(tick);
                markersContainer.appendChild(label);
            }

            // 小球の初期位置セット
            ball.style.top = `${getVisualY(y0) - 10}px`; // -10は球の半径分

            // グラフのスケール更新
            vtChart.options.scales.y.min = (mode === 'down') ? Math.min(0, v0) : Math.min(v0 + a * MAX_TIME, v0);
            vtChart.options.scales.y.max = (mode === 'down') ? Math.max(v0 + a * MAX_TIME, v0) : Math.max(0, v0);
            
            ytChart.options.scales.y.min = currentMinY;
            ytChart.options.scales.y.max = currentMaxY;
            
            vtChart.update();
            ytChart.update();
        }

        // 1秒ごとのプロットを追加
        function addPlotMark(t, y) {
            const py = getVisualY(y);
            const mark = document.createElement('div');
            mark.className = 'plot-mark';
            mark.style.top = `${py - 2}px`;
            const label = document.createElement('div');
            label.className = 'plot-label';
            label.innerText = `t=${t.toFixed(1)}s\ny=${y.toFixed(1)}m`;
            label.style.top = `${py}px`;
            markersContainer.appendChild(mark);
            markersContainer.appendChild(label);
        }

        // 物理エンジンのメインループ
        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            const t = (timestamp - startTime) / 1000;
            const v = v0 + a * t;
            const y = y0 + v0 * t + 0.5 * a * Math.pow(t, 2);

            // 画面の更新
            const visualY = getVisualY(y);
            ball.style.top = `${visualY - 10}px`;
            speedLabel.innerText = `${v.toFixed(1)} m/s`;
            timeDisplay.innerText = `時間: ${t.toFixed(1)} s`;

            // カメラの自動追従（小球を画面中央に保つ）
            simulationWrapper.scrollTop = visualY - (simulationWrapper.clientHeight / 2);

            // 1秒ごとのプロット描画
            if (t >= nextPlotTime && t <= MAX_TIME) {
                const exactY = y0 + v0 * nextPlotTime + 0.5 * a * Math.pow(nextPlotTime, 2);
                addPlotMark(nextPlotTime, exactY);
                nextPlotTime += 1.0;
            }

            // グラフの更新
            if (t - lastGraphUpdateTime >= 0.02) { 
                vtChart.data.datasets[0].data.push({ x: t, y: v });
                ytChart.data.datasets[0].data.push({ x: t, y: y });
                vtChart.update();
                ytChart.update();
                lastGraphUpdateTime = t;
            }

            // 10秒経過で自動停止
            if (t >= MAX_TIME) {
                isRunning = false;
                startBtn.innerText = "スタート";
                return; 
            }

            if (isRunning) {
                animationId = requestAnimationFrame(animate);
            }
        }

        function resetSimulation() {
            cancelAnimationFrame(animationId);
            isRunning = false;
            startTime = null;
            lastGraphUpdateTime = 0;
            nextPlotTime = 1.0;
            startBtn.innerText = "スタート";
            
            ball.style.top = `${getVisualY(y0) - 10}px`;
            speedLabel.innerText = `${v0.toFixed(1)} m/s`;
            timeDisplay.innerText = "時間: 0.0 s";
            
            vtChart.data.datasets[0].data = [];
            ytChart.data.datasets[0].data = [];
            setupEnvironment(); 
        }

        // ラジオボタン変更時の自動プリセット設定
        modeRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === 'up') {
                    // 投げ上げモードの場合、ビルの屋上(50m)から上に投げるイメージを初期セット
                    document.getElementById('y0').value = "50";
                    document.getElementById('v0').value = "20";
                } else {
                    // 落下モードの場合、y=0から静かに落とすイメージを初期セット
                    document.getElementById('y0').value = "0";
                    document.getElementById('v0').value = "0";
                }
                resetSimulation();
            });
        });

        startBtn.addEventListener('click', () => {
            if (isRunning) {
                cancelAnimationFrame(animationId);
                isRunning = false;
                startBtn.innerText = "再開";
            } else {
                if (startTime === null) {
                    setupEnvironment();
                    startTime = performance.now();
                } else {
                    const currentT = parseFloat(timeDisplay.innerText.replace(/[^0-9.]/g, ''));
                    startTime = performance.now() - (currentT * 1000);
                }
                
                isRunning = true;
                startBtn.innerText = "一時停止";
                animationId = requestAnimationFrame(animate);
            }
        });

        resetBtn.addEventListener('click', () => {
            resetSimulation();
        });

        document.getElementById('vtToggle').addEventListener('change', (e) => {
            document.getElementById('vtBox').style.display = e.target.checked ? 'block' : 'none';
        });
        document.getElementById('ytToggle').addEventListener('change', (e) => {
            document.getElementById('ytBox').style.display = e.target.checked ? 'block' : 'none';
        });

        // 初期セットアップ
        setupEnvironment();
    </script>
</body>
</html>
